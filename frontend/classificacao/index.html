<!DOCTYPE html>
<html>
<head>
    <title>Sistema de Classificação</title>
    <link rel="stylesheet" href="/static/inspection.css">
</head>
<body>
    <div id="container">
        <div class="top-banner">
            <img src="/static/logos/senai.png" alt="Logo Superior" class="top-logo">
        </div>
        <h1>Sistema de Classificação</h1>
        <button id="capture-btn">Tirar foto</button>
        <div id="result-container">
            <img id="result-img" src="" alt="Aguardando inspeção...">
            <div id="status-panel">
                <h2>Status:</h2>
                <div id="status-text">Aguardando inspeção...</div>
                <div id="defects-list"></div>
            </div>
        </div>
        <div class="bottom-banner">
            <div class="logo-container">
                <img src="/static/logos/eagro.png" alt="Logo 1" class="bottom-logo">
                <img src="/static/abapa.png" alt="Logo 2" class="bottom-logo">
                <img src="/static/logos/senaip.png" alt="Logo 3" class="bottom-logo">
            </div>
        </div>
    </div>
    <script src="/static/classificacao/script.js"></script>
</body>
</html>
